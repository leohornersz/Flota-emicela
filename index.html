<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vehículos">
<meta name="theme-color" content="#1E2D5B">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="favicon.png" type="image/png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Control de Vehículos - Emicela</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#F0F2F5;color:#1a1a1a;overflow-x:hidden;padding-bottom:20px}
.topbar{background:#1E2D5B;color:#fff;padding:10px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(30,45,91,.3)}
.topbar img{height:38px;border-radius:4px}
.topbar h1{font-size:16px;font-weight:600;flex:1}
.topbar-date{font-size:11px;opacity:.8}
.tabs{display:flex;background:#fff;border-bottom:1px solid #e0e0e0;position:sticky;top:58px;z-index:99;overflow-x:auto}
.tab{flex:1;padding:12px 6px;border:none;background:none;font-size:12px;color:#888;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;min-width:60px}
.tab.active{color:#1E2D5B;border-bottom-color:#1E2D5B;font-weight:600}
.panel{display:none;padding:16px;max-width:600px;margin:0 auto}
.panel.active{display:block}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:5px}
select,input[type=text],input[type=number],textarea{width:100%;padding:11px 12px;border:1px solid #ddd;border-radius:10px;font-size:15px;background:#fff;-webkit-appearance:none}
textarea{resize:vertical;min-height:60px;font-family:inherit}
select:focus,input:focus,textarea:focus{outline:none;border-color:#1E2D5B;box-shadow:0 0 0 3px rgba(30,45,91,.1)}
.btn-primary{width:100%;padding:14px;background:#1E2D5B;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin-top:6px}
.btn-primary:active{opacity:.9}
.btn-sm{padding:8px 14px;border:1px solid #ddd;border-radius:8px;background:#fff;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.btn-sm:active{background:#f5f5f5}
.btn-devolver{border-color:#059669;color:#059669;font-weight:600}
.btn-danger{background:#FEE2E2;color:#B91C1C;border-color:#FECACA}
.btn-print{background:#EFF6FF;color:#1E2D5B;border-color:#BFDBFE}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.stat{background:#fff;border-radius:10px;padding:12px 8px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stat-num{font-size:22px;font-weight:700;color:#1E2D5B}
.stat-label{font-size:10px;color:#888;text-transform:uppercase;margin-top:2px}
.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.card-title{font-size:15px;font-weight:600}
.card-meta{font-size:12px;color:#888;margin-top:3px;line-height:1.6}
.card-actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid #f0f0f0}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;white-space:nowrap}
.badge-out{background:#FEF2F2;color:#B91C1C}
.badge-in{background:#ECFDF5;color:#065F46}
.badge-warn{background:#FEF3C7;color:#92400E}
.badge-count{background:#EFF6FF;color:#1D4ED8}
.empty{text-align:center;padding:40px 20px;color:#aaa}
.empty-icon{font-size:40px;margin-bottom:10px}
.section-title{font-size:14px;font-weight:700;color:#1E2D5B;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.divider{height:1px;background:#eee;margin:18px 0}
.tag{display:inline-flex;align-items:center;gap:4px;background:#EFF6FF;color:#1E2D5B;padding:6px 10px;border-radius:20px;font-size:13px;margin:3px}
.tag button{border:none;background:none;color:#999;font-size:16px;cursor:pointer;padding:0 2px}
.add-row{display:flex;gap:8px;margin-bottom:10px}
.add-row input{flex:1}
.operario-avatar{width:36px;height:36px;border-radius:50%;background:#1E2D5B;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.alert{display:none;padding:12px 16px;border-radius:10px;font-size:14px;font-weight:500;margin-bottom:14px;animation:fadeIn .3s}
.alert.success{background:#ECFDF5;color:#065F46;display:block}
.alert.error{background:#FEF2F2;color:#B91C1C;display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.hist-toolbar{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
.view-toggle{display:flex;border:1px solid #ddd;border-radius:8px;overflow:hidden}
.view-toggle button{border:none;background:#fff;padding:7px 12px;font-size:14px;cursor:pointer;color:#888}
.view-toggle button.active{background:#1E2D5B;color:#fff}
.list-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.list-table{width:100%;border-collapse:collapse;font-size:12px;min-width:500px}
.list-table th{background:#1E2D5B;color:#fff;padding:8px 6px;text-align:left;font-size:11px;white-space:nowrap;position:sticky;top:0}
.list-table td{padding:7px 6px;border-bottom:1px solid #f0f0f0}
.list-table tr:nth-child(even){background:#f9f9f9}
.td-tool{font-weight:600;white-space:nowrap}
.td-op{white-space:nowrap}
.td-date{white-space:nowrap;font-size:11px}
.td-dur{white-space:nowrap}
.hist-dur{background:#EFF6FF;color:#1D4ED8;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:600}
.btn-del-row{border:none;background:none;color:#ccc;cursor:pointer;font-size:14px;padding:2px 4px}
.btn-del-row:hover{color:#B91C1C}
.cb-del{width:18px;height:18px;accent-color:#1E2D5B}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;border-radius:16px;padding:24px;max-width:340px;width:100%;text-align:center}
.modal-box h3{margin-bottom:8px;font-size:17px}
.modal-box p{font-size:14px;color:#666;margin-bottom:20px}
.modal-btns{display:flex;gap:10px;justify-content:center}
.modal-btns button{flex:1;padding:12px;border-radius:10px;border:none;font-size:15px;font-weight:600;cursor:pointer}
.inc-priority-alta{border-left:4px solid #B91C1C!important}
.inc-priority-media{border-left:4px solid #F59E0B!important}
.inc-priority-baja{border-left:4px solid #10B981!important}
@media print{
  .topbar,.tabs,.hist-toolbar,.card-actions,.btn-sm,.btn-primary,.alert,.modal-overlay,.btn-del-row,.cb-del,.view-toggle{display:none!important}
  .panel{display:block!important;padding:0}
  body{background:#fff}
}
</style>
</head>

  </div>
  <div class="field">

</div>

<div id="panel-activos" class="panel">
  <div class="stats">

  </div>

  </div>
  <div id="lista-activos"></div>
</div>

<div id="panel-incidencias" class="panel">

<script>
var KEY_REG='vh_reg',KEY_CON='vh_con',KEY_VEH='vh_veh',KEY_ZON='vh_zon',KEY_INC='vh_inc';
var registros=[],conductores=[],vehiculos=[],zonas=[],incidencias=[];
var histView='card',activosMode='card';

var DEFAULT_CON=[];
var DEFAULT_VEH=[];
var DEFAULT_ZON=[];
var DEFAULT_REG=[];
var DEFAULT_INC=[];

function save(){
  try{
    localStorage.setItem(KEY_REG,JSON.stringify(registros));
    localStorage.setItem(KEY_CON,JSON.stringify(conductores));
    localStorage.setItem(KEY_VEH,JSON.stringify(vehiculos));
    localStorage.setItem(KEY_ZON,JSON.stringify(zonas));
    localStorage.setItem(KEY_INC,JSON.stringify(incidencias));
  }catch(e){}
}

function load(){
  try{
    registros=JSON.parse(localStorage.getItem(KEY_REG)||'[]');
    conductores=JSON.parse(localStorage.getItem(KEY_CON)||'[]');
    vehiculos=JSON.parse(localStorage.getItem(KEY_VEH)||'[]');
    zonas=JSON.parse(localStorage.getItem(KEY_ZON)||'[]');
    incidencias=JSON.parse(localStorage.getItem(KEY_INC)||'[]');
  }catch(e){registros=[];conductores=[];vehiculos=[];zonas=[];incidencias=[];}
}

function syncFromServer(){
  if(registros.length||conductores.length) return;
  fetch('datos.json?t='+Date.now()).then(function(r){
    if(!r.ok) return;return r.json();
  }).then(function(data){
    if(!data) return;
    if(data.registros) registros=data.registros;
    if(data.conductores) conductores=data.conductores;
    if(data.vehiculos) vehiculos=data.vehiculos;
    if(data.zonas) zonas=data.zonas;
    if(data.incidencias) incidencias=data.incidencias;
    save();fillSelects();renderConfig();
    showAlert('Datos cargados del servidor');
  }).catch(function(){});
}

function exportarDatosServidor(){
  var data={registros:registros,conductores:conductores,vehiculos:vehiculos,zonas:zonas,incidencias:incidencias,exportado:new Date().toISOString(),version:1};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='datos.json';a.click();URL.revokeObjectURL(a.href);
}

function forzarSync(){
  fetch('datos.json?t='+Date.now()).then(function(r){
    if(!r.ok) throw new Error('No hay datos.json');return r.json();
  }).then(function(data){
    if(!data) return;
    if(data.registros) registros=data.registros;
    if(data.conductores) conductores=data.conductores;
    if(data.vehiculos) vehiculos=data.vehiculos;
    if(data.zonas) zonas=data.zonas;
    if(data.incidencias) incidencias=data.incidencias;
    save();fillSelects();renderConfig();
    showAlert('Datos sincronizados correctamente');
  }).catch(function(){showAlert('No se encontro datos.json en el servidor','error');});
}

function fmt(ts){
  if(!ts) return '-';
  var d=new Date(ts);
  return d.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit'})+' '+d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
}

function fmtDur(ms){
  if(!ms||ms<0) return '-';
  var m=Math.floor(ms/60000),h=Math.floor(m/60);
  if(h>0) return h+'h '+String(m%60).padStart(2,'0')+'m';
  return m+'m';
}

function showAlert(msg,type){
  var panels=['alert-salida','alert-inc'];
  panels.forEach(function(id){
    var el=document.getElementById(id);
    if(el){el.className='alert '+(type||'success');el.textContent=msg;
    setTimeout(function(){el.className='alert';},3000);}
  });
}

function switchTab(tab){
  var tabs=['salida','activos','incidencias','historial','config'];
  var btns=document.querySelectorAll('.tab');
  var panels=document.querySelectorAll('.panel');
  for(var i=0;i<btns.length;i++){btns[i].classList.remove('active');panels[i].classList.remove('active');}
  btns[tabs.indexOf(tab)].classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
  if(tab==='activos') renderActivos();
  if(tab==='incidencias') renderIncidencias();
  if(tab==='historial') renderHistorial();
  if(tab==='config') renderConfig();
}

function fillSelects(){
  ['sel-conductor','fil-cond','fil-hist-cond'].forEach(function(id){
    var el=document.getElementById(id);
    var cur=el.value;
    var isF=id.indexOf('fil')===0;
    el.innerHTML=isF?'<option value="">Todos los conductores</option>':'<option value="">-- Seleccionar --</option>';
    conductores.forEach(function(c){el.innerHTML+='<option value="'+c+'">'+c+'</option>';});
    el.value=cur;
  });
  ['sel-vehiculo','inc-vehiculo'].forEach(function(id){
    var el=document.getElementById(id);
    var cur=el.value;
    el.innerHTML='<option value="">-- Seleccionar --</option>';
    vehiculos.forEach(function(v){el.innerHTML+='<option value="'+v+'">'+v+'</option>';});
    el.value=cur;
  });
  var selZona=document.getElementById('sel-zona');
  var curZona=selZona.value;
  selZona.innerHTML='<option value="">-- Seleccionar zona --</option>';
  zonas.forEach(function(z){selZona.innerHTML+='<option value="'+z+'">'+z+'</option>';});
  selZona.value=curZona;
}

function registrarSalida(){
  var cond=document.getElementById('sel-conductor').value;
  var veh=document.getElementById('sel-vehiculo').value;
  var zona=document.getElementById('sel-zona').value;
  var km=document.getElementById('inp-km-sal').value.trim();
  var obs=document.getElementById('inp-obs').value.trim();
  if(!cond){showAlert('Selecciona un conductor','error');return;}
  if(!veh){showAlert('Selecciona un vehículo','error');return;}
  // Check if vehicle already out
  for(var i=0;i<registros.length;i++){
    if(!registros[i].devuelta&&registros[i].vehiculo===veh){
      showAlert('El vehículo '+veh+' ya está fuera ('+registros[i].conductor+')','error');return;
    }
  }
  registros.unshift({id:Date.now(),conductor:cond,vehiculo:veh,zona:zona,kmSalida:km,kmDevolucion:'',obs:obs,salida:Date.now(),devuelta:null});
  save();
  showAlert('Vehículo '+veh+' asignado a '+cond);
  document.getElementById('sel-conductor').value='';
  document.getElementById('sel-vehiculo').value='';
  document.getElementById('inp-km-sal').value='';
  document.getElementById('inp-obs').value='';
}

function devolverVehiculo(id){
  var kmDev=prompt('Km devolución (opcional):');
  for(var i=0;i<registros.length;i++){
    if(registros[i].id===id){
      registros[i].devuelta=Date.now();
      if(kmDev) registros[i].kmDevolucion=kmDev;
      break;
    }
  }
  save();renderActivos();
}

function setActivosMode(m){
  activosMode=m;
  document.getElementById('va-card').classList.toggle('active',m==='card');
  document.getElementById('va-list').classList.toggle('active',m==='list');
  renderActivos();
}

function renderActivos(){
  var fop=document.getElementById('fil-cond').value;
  var hoy=new Date();hoy.setHours(0,0,0,0);
  var activos=registros.filter(function(r){return !r.devuelta&&(!fop||r.conductor===fop);});
  var salHoy=registros.filter(function(r){return r.salida>=hoy.getTime();}).length;
  var incAbiertas=incidencias.filter(function(inc){return !inc.resuelta;}).length;
  document.getElementById('stat-fuera').textContent=activos.length;
  var condSet={};activos.forEach(function(r){condSet[r.conductor]=1;});
  document.getElementById('stat-cond').textContent=Object.keys(condSet).length;
  document.getElementById('stat-hoy').textContent=salHoy;
  document.getElementById('stat-inc').textContent=incAbiertas;
  var el=document.getElementById('lista-activos');
  if(!activos.length){el.innerHTML='<div class="empty"><div class="empty-icon">&#9989;</div>Todos los veh&iacute;culos en base</div>';return;}

  if(activosMode==='list'){
    var html='<div class="list-scroll"><table class="list-table"><thead><tr><th>Veh&iacute;culo</th><th>Conductor</th><th>Zona</th><th>Km</th><th>Salida</th><th>Tiempo</th><th></th></tr></thead><tbody>';
    activos.forEach(function(r){
      html+='<tr><td class="td-tool">'+r.vehiculo+'</td><td class="td-op">'+r.conductor+'</td><td class="td-op">'+(r.zona||'-')+'</td><td>'+(r.kmSalida||'-')+'</td><td class="td-date">'+fmt(r.salida)+'</td><td class="td-dur"><span class="hist-dur">'+fmtDur(Date.now()-r.salida)+'</span></td><td><button class="btn-sm btn-devolver" onclick="devolverVehiculo('+r.id+')" style="padding:4px 10px;font-size:11px">&#10003;</button></td></tr>';
    });
    html+='</tbody></table></div>';
    el.innerHTML=html;
    return;
  }

  var html='';
  activos.forEach(function(r){
    var av=(r.conductor.substring(0,2)).toUpperCase();
    var dur=fmtDur(Date.now()-r.salida);
    html+='<div class="card"><div class="card-header"><div style="display:flex;gap:10px;align-items:center;flex:1"><div class="operario-avatar">'+av+'</div><div><div class="card-title">&#128663; '+r.vehiculo+'</div><div class="card-meta">&#128100; '+r.conductor+'</div>';
    if(r.zona) html+='<div class="card-meta">&#128205; '+r.zona+'</div>';
    html+='<div class="card-meta">&#128336; '+fmt(r.salida)+' &middot; <strong>'+dur+'</strong></div>';
    if(r.kmSalida) html+='<div class="card-meta">&#128663; Km: '+r.kmSalida+'</div>';
    if(r.obs) html+='<div class="card-meta">&#128221; '+r.obs+'</div>';
    html+='</div></div><span class="badge badge-out">Fuera</span></div>';
    html+='<div class="card-actions"><button class="btn-sm btn-devolver" onclick="devolverVehiculo('+r.id+')">&#10003; Devolver</button></div></div>';
  });
  el.innerHTML=html;
}

// INCIDENCIAS
function registrarIncidencia(){
  var veh=document.getElementById('inc-vehiculo').value;
  var tipo=document.getElementById('inc-tipo').value;
  var pri=document.getElementById('inc-prioridad').value;
  var desc=document.getElementById('inc-desc').value.trim();
  if(!veh){showAlert('Selecciona un vehículo','error');return;}
  if(!tipo){showAlert('Selecciona un tipo','error');return;}
  if(!desc){showAlert('Describe la incidencia','error');return;}
  incidencias.unshift({id:Date.now(),vehiculo:veh,tipo:tipo,prioridad:pri,descripcion:desc,fecha:Date.now(),resuelta:null});
  save();
  showAlert('Incidencia registrada para '+veh);
  document.getElementById('inc-vehiculo').value='';
  document.getElementById('inc-tipo').value='';
  document.getElementById('inc-prioridad').value='media';
  document.getElementById('inc-desc').value='';
  renderIncidencias();
}

function resolverIncidencia(id){
  for(var i=0;i<incidencias.length;i++){
    if(incidencias[i].id===id){incidencias[i].resuelta=Date.now();break;}
  }
  save();renderIncidencias();
}

function borrarIncidencia(id){
  incidencias=incidencias.filter(function(inc){return inc.id!==id;});
  save();renderIncidencias();
}

function renderIncidencias(){
  var estado=document.getElementById('fil-inc-estado').value;
  var lista=incidencias.filter(function(inc){
    if(estado==='abiertas') return !inc.resuelta;
    return true;
  });
  var el=document.getElementById('lista-incidencias');
  if(!lista.length){el.innerHTML='<div class="empty"><div class="empty-icon">&#9888;</div>'+(estado==='abiertas'?'Sin incidencias abiertas':'Sin incidencias registradas')+'</div>';return;}
  var html='';
  lista.forEach(function(inc){
    html+='<div class="card inc-priority-'+inc.prioridad+'">';
    html+='<div class="card-header"><div style="flex:1"><div class="card-title">&#128663; '+inc.vehiculo+' &mdash; '+inc.tipo+'</div>';
    html+='<div class="card-meta">&#128197; '+fmt(inc.fecha)+' &middot; Prioridad: <strong>'+inc.prioridad.toUpperCase()+'</strong></div>';
    html+='<div class="card-meta" style="color:#333;margin-top:6px">'+inc.descripcion+'</div>';
    if(inc.resuelta) html+='<div class="card-meta">&#9989; Resuelta: '+fmt(inc.resuelta)+'</div>';
    html+='</div>'+(inc.resuelta?'<span class="badge badge-in">Resuelta</span>':'<span class="badge badge-warn">Abierta</span>')+'</div>';
    html+='<div class="card-actions">';
    if(!inc.resuelta) html+='<button class="btn-sm btn-devolver" onclick="resolverIncidencia('+inc.id+')">&#10003; Resolver</button>';
    html+='<button class="btn-sm btn-danger" onclick="borrarIncidencia('+inc.id+')">&#128465; Eliminar</button>';
    html+='</div></div>';
  });
  el.innerHTML=html;
}

function renderHistorial(){

  var devueltos=registros.filter(function(r){return r.devuelta&&(!fop||r.conductor===fop);});
  var el=document.getElementById('lista-historial');
  if(!devueltos.length){el.innerHTML='<div class="empty"><div class="empty-icon">&#128336;</div>Sin registros devueltos</div>';return;}

  if(histView==='list'){
    var html='<div class="list-scroll"><table class="list-table"><thead><tr><th>Veh&iacute;culo</th><th>Conductor</th><th>Zona</th><th>Km sal.</th><th>Km dev.</th><th>Salida</th><th>Devuelta</th><th>Dur.</th><th></th></tr></thead><tbody>';
    devueltos.forEach(function(r){
      var kmDif=(r.kmSalida&&r.kmDevolucion)?(Number(r.kmDevolucion)-Number(r.kmSalida)):'';

    });
    html+='</tbody></table></div>';
    el.innerHTML=html;
    return;
  }

  var html='';
  devueltos.forEach(function(r){
    var dur=fmtDur(r.devuelta-r.salida);
    var kmDif=(r.kmSalida&&r.kmDevolucion)?(Number(r.kmDevolucion)-Number(r.kmSalida))+' km':'';
    html+='<div class="card"><div class="card-header"><div style="flex:1"><div class="card-title">&#128663; '+r.vehiculo+'</div>';
    html+='<div class="card-meta">&#128100; '+r.conductor+'</div>';
    if(r.zona) html+='<div class="card-meta">&#128205; '+r.zona+'</div>';
    html+='<div class="card-meta">&#128336; '+fmt(r.salida)+' &#10132; '+fmt(r.devuelta)+' &middot; <strong>'+dur+'</strong></div>';
    if(r.kmSalida) html+='<div class="card-meta">&#128663; '+r.kmSalida+(r.kmDevolucion?' &#10132; '+r.kmDevolucion:'')+(kmDif?' &middot; <strong>'+kmDif+'</strong>':'')+'</div>';
    if(r.obs) html+='<div class="card-meta">&#128221; '+r.obs+'</div>';
    html+='</div><span class="badge badge-in">&#10003; Devuelto</span></div></div>';
  });
  el.innerHTML=html;
}

function borrarRegistro(id){
  document.getElementById('modal-title').textContent='Eliminar registro?';
  document.getElementById('modal-msg').textContent='Se eliminara este registro.';
  document.getElementById('modal-confirm-btn').onclick=function(){
    registros=registros.filter(function(r){return r.id!==id;});
    save();cerrarModal();renderHistorial();renderActivos();
  };
  document.getElementById('modal-confirm').classList.add('open');
}

}

// CONFIG
function renderConfig(){
  document.getElementById('tags-conductores').innerHTML=conductores.map(function(c,i){return '<span class="tag">'+c+'<button onclick="removeCond('+i+')">&times;</button></span>';}).join('');
  document.getElementById('tags-vehiculos').innerHTML=vehiculos.map(function(v,i){return '<span class="tag">'+v+'<button onclick="removeVeh('+i+')">&times;</button></span>';}).join('');
  document.getElementById('tags-zonas').innerHTML=zonas.map(function(z,i){return '<span class="tag">'+z+'<button onclick="removeZona('+i+')">&times;</button></span>';}).join('');
  if(!conductores.length) document.getElementById('tags-conductores').innerHTML='<div style="font-size:12px;color:#aaa;padding:8px 0">Sin conductores</div>';
  if(!vehiculos.length) document.getElementById('tags-vehiculos').innerHTML='<div style="font-size:12px;color:#aaa;padding:8px 0">Sin veh&iacute;culos</div>';
  if(!zonas.length) document.getElementById('tags-zonas').innerHTML='<div style="font-size:12px;color:#aaa;padding:8px 0">Sin zonas</div>';
}

function addCond(){var v=document.getElementById('inp-nuevo-cond').value.trim().toUpperCase();if(!v)return;if(conductores.indexOf(v)>=0)return;conductores.push(v);save();fillSelects();renderConfig();document.getElementById('inp-nuevo-cond').value='';}
function addVeh(){var v=document.getElementById('inp-nuevo-veh').value.trim().toUpperCase();if(!v)return;if(vehiculos.indexOf(v)>=0)return;vehiculos.push(v);save();fillSelects();renderConfig();document.getElementById('inp-nuevo-veh').value='';}
function addZona(){var v=document.getElementById('inp-nueva-zona').value.trim();if(!v)return;if(zonas.indexOf(v)>=0)return;zonas.push(v);save();fillSelects();renderConfig();document.getElementById('inp-nueva-zona').value='';}

function removeCond(i){
  for(var j=0;j<registros.length;j++) if(!registros[j].devuelta&&registros[j].conductor===conductores[i]){alert('Este conductor tiene un vehículo fuera');return;}
  conductores.splice(i,1);save();fillSelects();renderConfig();
}
function removeVeh(i){
  for(var j=0;j<registros.length;j++) if(!registros[j].devuelta&&registros[j].vehiculo===vehiculos[i]){alert('Este vehículo está fuera');return;}
  vehiculos.splice(i,1);save();fillSelects();renderConfig();
}
function removeZona(i){zonas.splice(i,1);save();fillSelects();renderConfig();}

function exportarJSON(){
  var data={registros:registros,conductores:conductores,vehiculos:vehiculos,zonas:zonas,incidencias:incidencias,exportado:new Date().toISOString(),version:1};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='vehiculos_'+new Date().toISOString().slice(0,10)+'.json';a.click();
}

function importarJSON(evt,reemplazar){
  var file=evt.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      if(reemplazar){
        if(data.registros) registros=data.registros;
        if(data.conductores) conductores=data.conductores;
        if(data.vehiculos) vehiculos=data.vehiculos;
        if(data.zonas) zonas=data.zonas;
        if(data.incidencias) incidencias=data.incidencias;
      }else{
        if(data.registros){var ids={};registros.forEach(function(r){ids[r.id]=1;});data.registros.forEach(function(r){if(!ids[r.id])registros.push(r);});registros.sort(function(a,b){return b.salida-a.salida;});}
        if(data.conductores) data.conductores.forEach(function(c){if(conductores.indexOf(c)<0)conductores.push(c);});
        if(data.vehiculos) data.vehiculos.forEach(function(v){if(vehiculos.indexOf(v)<0)vehiculos.push(v);});
        if(data.zonas) data.zonas.forEach(function(z){if(zonas.indexOf(z)<0)zonas.push(z);});
        if(data.incidencias){var iids={};incidencias.forEach(function(inc){iids[inc.id]=1;});data.incidencias.forEach(function(inc){if(!iids[inc.id])incidencias.push(inc);});}
      }
      save();fillSelects();renderConfig();
      showAlert('Datos importados correctamente');
    }catch(err){showAlert('Error al leer el archivo','error');}
  };
  reader.readAsText(file);
  evt.target.value='';
}

function cerrarModal(){document.getElementById('modal-confirm').classList.remove('open');}

function confirmarBorrar(){
  document.getElementById('modal-title').textContent='Borrar todo?';
  document.getElementById('modal-msg').textContent='Se borraran todos los registros e incidencias. Conductores, vehículos y zonas se mantienen.';
  document.getElementById('modal-confirm-btn').onclick=function(){
    registros=[];incidencias=[];save();cerrarModal();renderActivos();renderHistorial();renderIncidencias();
  };
  document.getElementById('modal-confirm').classList.add('open');
}

document.getElementById('fecha').textContent=new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
load();fillSelects();syncFromServer();
</script>
